<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>She Can Foundation | Admin Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="admin-body">

    <!-- Glowing Background Decorative Blobs -->
    <div class="glow-blob-container">
        <div class="glow-blob blob-1"></div>
        <div class="glow-blob blob-2"></div>
    </div>

    <!-- ==========================================
       ADMIN NAVIGATION BAR & MONITOR
       ========================================== -->
    <header class="admin-header">
        <div class="container admin-nav-container">
            <!-- Brand Logo -->
            <a href="/" class="logo" aria-label="She Can Foundation Homepage">
                <div class="logo-icon">S</div>
                <span>She Can <span class="gradient-text">Portal.</span></span>
            </a>

            <!-- Controls (Theme Toggle & API Status Indicator) -->
            <div class="nav-controls">
                <!-- Live Health Monitor Status Indicator -->
                <div class="api-status-pill" id="api-status">
                    <span class="status-dot"></span>
                    <span class="status-text">Checking API...</span>
                </div>

                <!-- Theme Toggle Switch -->
                <button class="theme-toggle-btn" id="theme-toggle" aria-label="Toggle Dark Mode" title="Toggle Theme">
                    <!-- Sun Icon (Show in dark mode) -->
                    <svg class="sun-icon" viewBox="0 0 24 24">
                        <path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58c-.39-.39-1.03-.39-1.41 0s-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37c-.39-.39-1.03-.39-1.41 0s-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41l-1.06-1.06zm1.06-10.96c.39-.39.39-1.03 0-1.41s-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06zM7.05 18.01c.39-.39.39-1.03 0-1.41s-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06z"/>
                    </svg>
                    <!-- Moon Icon (Show in light mode) -->
                    <svg class="moon-icon" viewBox="0 0 24 24">
                        <path d="M9.37 5.51c-.18.64-.27 1.31-.27 2 0 4.42 3.58 8 8 8 .69 0 1.36-.09 2-.27 1.24 3.73-1.43 7.76-5.37 7.76-3.87 0-7-3.13-7-7 0-3.94 4.03-6.61 7.64-5.49z"/>
                    </svg>
                </button>
            </div>
        </div>
    </header>

    <main class="container">
        <!-- ==========================================
           KPI METRICS WIDGETS
           ========================================== -->
        <div class="dashboard-grid">
            <!-- Metric 1: Total Registrations -->
            <div class="kpi-card glass-card">
                <div class="kpi-icon-box">
                    <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                </div>
                <div class="kpi-details">
                    <div class="kpi-value" id="kpi-total">0</div>
                    <div class="kpi-label">Total Submissions</div>
                </div>
            </div>

            <!-- Metric 2: Today's Registrations -->
            <div class="kpi-card glass-card">
                <div class="kpi-icon-box">
                    <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                </div>
                <div class="kpi-details">
                    <div class="kpi-value" id="kpi-today">0</div>
                    <div class="kpi-label">Submissions Today</div>
                </div>
            </div>

            <!-- Metric 3: Target Limit Status -->
            <div class="kpi-card glass-card">
                <div class="kpi-icon-box">
                    <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z"></path></svg>
                </div>
                <div class="kpi-details">
                    <div class="kpi-value" id="kpi-status-text">Active</div>
                    <div class="kpi-label">API Gateway Node</div>
                </div>
            </div>
        </div>

        <!-- ==========================================
           CONTROL TOOLBAR (SEARCH & REFRESH)
           ========================================== -->
        <div class="admin-control-bar">
            <!-- Dynamic Search input -->
            <div class="search-wrapper">
                <svg class="search-icon-svg" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                <input type="text" class="search-input" id="search-submissions" placeholder="Search by name or email address...">
            </div>

            <!-- Manual Refresh Action button -->
            <button class="btn btn-secondary btn-refresh" id="btn-refresh">
                <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.283 8H18"></path></svg>
                <span>Reload Submissions</span>
            </button>
        </div>

        <!-- ==========================================
           SUBMISSIONS TABLE CARD
           ========================================== -->
        <div class="admin-table-container">
            <table class="admin-table" id="submissions-table">
                <thead>
                    <tr>
                        <th>Full Name</th>
                        <th>Email Address</th>
                        <th>Message Details</th>
                        <th>Submitted At</th>
                        <th style="width: 100px; text-align: center;">Actions</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    <!-- Dynamic entries will be inserted here -->
                </tbody>
            </table>

            <!-- Dynamic State overlays (Loaded dynamically) -->
            <div id="table-state-overlay" class="table-state-overlay hidden">
                <!-- Will be hydrated with loading, error or empty layout -->
            </div>
        </div>
    </main>

    <!-- Toast Notification Container -->
    <div id="toast-container" class="toast-container"></div>

    <!-- ==========================================
       DASHBOARD CONTROLLER JAVASCRIPT
       ========================================== -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Theme Manager Connection
            const themeToggleBtn = document.getElementById('theme-toggle');
            const htmlElement = document.documentElement;
            
            const savedTheme = localStorage.getItem('theme');
            const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            
            if (savedTheme === 'dark' || (!savedTheme && systemPrefersDark)) {
                htmlElement.setAttribute('data-theme', 'dark');
            } else {
                htmlElement.setAttribute('data-theme', 'light');
            }
            
            if (themeToggleBtn) {
                themeToggleBtn.addEventListener('click', () => {
                    const currentTheme = htmlElement.getAttribute('data-theme');
                    let newTheme = 'light';
                    if (currentTheme === 'light') newTheme = 'dark';
                    htmlElement.setAttribute('data-theme', newTheme);
                    localStorage.setItem('theme', newTheme);
                });
            }

            // Toast Alerts Dispatcher
            const showToast = (title, message, type = 'success') => {
                const container = document.getElementById('toast-container');
                if (!container) return;

                const toast = document.createElement('div');
                toast.className = `toast-card toast-${type}`;
                
                let iconSvg = '';
                if (type === 'success') {
                    iconSvg = `<svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>`;
                } else if (type === 'error') {
                    iconSvg = `<svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>`;
                } else {
                    iconSvg = `<svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>`;
                }

                toast.innerHTML = `
                    <div class="toast-icon-box">
                        ${iconSvg}
                    </div>
                    <div class="toast-content-box">
                        <div class="toast-title">${title}</div>
                        <div class="toast-message">${message}</div>
                    </div>
                    <button class="toast-close-btn" aria-label="Close Toast">
                        <svg width="16" height="16" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"></path></svg>
                    </button>
                `;

                container.appendChild(toast);

                const closeBtn = toast.querySelector('.toast-close-btn');
                closeBtn.addEventListener('click', () => {
                    toast.classList.add('slide-out');
                    setTimeout(() => toast.remove(), 400);
                });

                setTimeout(() => {
                    if (toast.parentNode) {
                        toast.classList.add('slide-out');
                        setTimeout(() => toast.remove(), 400);
                    }
                }, 5000);
            };

            // DOM elements
            const tableBody = document.getElementById('table-body');
            const stateOverlay = document.getElementById('table-state-overlay');
            const searchInput = document.getElementById('search-submissions');
            const btnRefresh = document.getElementById('btn-refresh');
            const apiPill = document.getElementById('api-status');
            
            // KPIs
            const kpiTotal = document.getElementById('kpi-total');
            const kpiToday = document.getElementById('kpi-today');

            let allSubmissions = [];

            // ==========================================
            // Live API Gateway Health Checker
            // ==========================================
            const checkAPIHealth = async () => {
                const startTime = performance.now();
                const isStaticEnv = window.location.hostname.includes('github.io') || window.location.protocol === 'file:';
                if (isStaticEnv) {
                    apiPill.className = 'api-status-pill online';
                    apiPill.querySelector('.status-text').textContent = 'Offline Local Mode';
                    return;
                }
                
                try {
                    const res = await fetch('/api/health');
                    const latency = Math.round(performance.now() - startTime);
                    
                    if (res.ok) {
                        apiPill.className = 'api-status-pill online';
                        apiPill.querySelector('.status-text').textContent = `API Online (${latency}ms)`;
                    } else {
                        throw new Error('API reported unhealthy status');
                    }
                } catch (err) {
                    apiPill.className = 'api-status-pill offline';
                    apiPill.querySelector('.status-text').textContent = 'API Offline (Local Storage Mode)';
                }
            };

            // Run status checks periodically
            setInterval(checkAPIHealth, 10000);
            checkAPIHealth();

            // ==========================================
            // Submissions Data Hydration
            // ==========================================
            const showOverlay = (type, message) => {
                stateOverlay.classList.remove('hidden');
                tableBody.innerHTML = '';
                
                let iconSvg = '';
                if (type === 'loading') {
                    stateOverlay.className = 'table-state-overlay loading';
                    iconSvg = `<svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.283 8H18"></path></svg>`;
                } else if (type === 'empty') {
                    stateOverlay.className = 'table-state-overlay empty';
                    iconSvg = `<svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0a2 2 0 01-2 2H6a2 2 0 01-2-2m16 0V9a2 2 0 00-2-2H6a2 2 0 00-2 2v4M5 20h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v11a2 2 0 002 2z"></path></svg>`;
                } else {
                    stateOverlay.className = 'table-state-overlay error';
                    iconSvg = `<svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>`;
                }

                stateOverlay.innerHTML = `
                    ${iconSvg}
                    <p>${message}</p>
                `;
            };

            const hideOverlay = () => {
                stateOverlay.classList.add('hidden');
            };

            const fetchSubmissions = async (searchQuery = '') => {
                showOverlay('loading', 'Retrieving registrations from database...');
                
                const isStaticEnv = window.location.hostname.includes('github.io') || window.location.protocol === 'file:';
                
                if (isStaticEnv) {
                    await new Promise(resolve => setTimeout(resolve, 500));
                    
                    let data = JSON.parse(localStorage.getItem('static_submissions') || '[]');
                    if (searchQuery) {
                        const query = searchQuery.toLowerCase();
                        data = data.filter(sub => 
                            sub.name.toLowerCase().includes(query) || 
                            sub.email.toLowerCase().includes(query) ||
                            sub.message.toLowerCase().includes(query)
                        );
                    }
                    
                    allSubmissions = data;
                    kpiTotal.textContent = data.length;
                    
                    const startOfToday = new Date();
                    startOfToday.setHours(0,0,0,0);
                    const todayCount = allSubmissions.filter(sub => new Date(sub.createdAt) >= startOfToday).length;
                    kpiToday.textContent = todayCount;
                    
                    document.getElementById('kpi-status-text').textContent = 'Local DB';
                    
                    if (allSubmissions.length === 0) {
                        showOverlay('empty', searchQuery ? 'No registrations match your search criteria.' : 'No registrations found in Local Storage.');
                        return;
                    }
                    
                    hideOverlay();
                    renderTable(allSubmissions);
                    return;
                }
                
                try {
                    let endpoint = '/api/submissions';
                    if (searchQuery) {
                        endpoint += `?search=${encodeURIComponent(searchQuery)}`;
                    }

                    const res = await fetch(endpoint);
                    const result = await res.json();

                    if (res.ok && result.success) {
                        allSubmissions = result.data;
                        
                        // Hydrate metrics
                        kpiTotal.textContent = result.total;
                        
                        // Count today's submissions
                        const startOfToday = new Date();
                        startOfToday.setHours(0,0,0,0);
                        const todayCount = allSubmissions.filter(sub => new Date(sub.createdAt) >= startOfToday).length;
                        kpiToday.textContent = todayCount;

                        if (allSubmissions.length === 0) {
                            showOverlay('empty', searchQuery ? 'No registrations match your search criteria.' : 'No registrations found in the system yet.');
                            return;
                        }

                        hideOverlay();
                        renderTable(allSubmissions);
                    } else {
                        throw new Error(result.message || 'Failed to fetch');
                    }
                } catch (error) {
                    console.error('Fetch error, falling back to local storage:', error);
                    
                    let data = JSON.parse(localStorage.getItem('static_submissions') || '[]');
                    if (searchQuery) {
                        const query = searchQuery.toLowerCase();
                        data = data.filter(sub => 
                            sub.name.toLowerCase().includes(query) || 
                            sub.email.toLowerCase().includes(query) ||
                            sub.message.toLowerCase().includes(query)
                        );
                    }
                    allSubmissions = data;
                    kpiTotal.textContent = data.length;
                    
                    const startOfToday = new Date();
                    startOfToday.setHours(0,0,0,0);
                    const todayCount = allSubmissions.filter(sub => new Date(sub.createdAt) >= startOfToday).length;
                    kpiToday.textContent = todayCount;
                    
                    document.getElementById('kpi-status-text').textContent = 'Local DB (Offline)';
                    
                    if (allSubmissions.length === 0) {
                        showOverlay('empty', 'API offline. No registrations found in Local Storage.');
                        return;
                    }
                    
                    hideOverlay();
                    renderTable(allSubmissions);
                }
            };

            const renderTable = (data) => {
                tableBody.innerHTML = '';
                
                data.forEach(item => {
                    const row = document.createElement('tr');
                    row.id = `row-${item._id}`;
                    
                    const dateObj = new Date(item.createdAt);
                    const formattedDate = dateObj.toLocaleDateString('en-US', {
                        month: 'short',
                        day: 'numeric',
                        year: 'numeric'
                    }) + ' at ' + dateObj.toLocaleTimeString('en-US', {
                        hour: '2-digit',
                        minute: '2-digit'
                    });

                    row.innerHTML = `
                        <td class="admin-name-cell">${item.name}</td>
                        <td class="admin-email-cell">${item.email}</td>
                        <td class="admin-message-cell" id="msg-${item._id}" title="Click the view icon to read full text">${item.message}</td>
                        <td class="admin-date-cell">${formattedDate}</td>
                        <td>
                            <div class="btn-cell-action">
                                <button class="btn-icon-action btn-view" data-id="${item._id}" title="Toggle Message Expansion">
                                    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
                                </button>
                                <button class="btn-icon-action btn-delete" data-id="${item._id}" title="Delete Registration Record">
                                    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                                </button>
                            </div>
                        </td>
                    `;
                    tableBody.appendChild(row);
                });

                // Attach dynamic cell triggers
                document.querySelectorAll('.btn-view').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const id = btn.getAttribute('data-id');
                        const msgCell = document.getElementById(`msg-${id}`);
                        if (msgCell) {
                            msgCell.classList.toggle('expanded');
                            btn.classList.toggle('active');
                        }
                    });
                });

                document.querySelectorAll('.btn-delete').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const id = btn.getAttribute('data-id');
                        confirmDelete(id);
                    });
                });
            };

            // ==========================================
            // Delete Submission Action Operations
            // ==========================================
            const confirmDelete = async (id) => {
                if (confirm('Are you sure you want to delete this volunteer registration permanently?')) {
                    const isStaticEnv = window.location.hostname.includes('github.io') || window.location.protocol === 'file:';
                    const isLocalDBMode = document.getElementById('kpi-status-text').textContent.includes('Local DB');
                    
                    if (isStaticEnv || isLocalDBMode) {
                        let data = JSON.parse(localStorage.getItem('static_submissions') || '[]');
                        data = data.filter(sub => sub._id !== id);
                        localStorage.setItem('static_submissions', JSON.stringify(data));
                        
                        showToast('Record Deleted', 'Submission record has been removed from Local Storage.', 'success');
                        
                        const row = document.getElementById(`row-${id}`);
                        if (row) {
                            row.style.opacity = '0';
                            row.style.transform = 'scale(0.95)';
                            row.style.transition = 'all 0.3s ease';
                            setTimeout(() => {
                                row.remove();
                                fetchSubmissions(searchInput.value.trim());
                            }, 300);
                        }
                        return;
                    }
                    
                    try {
                        const res = await fetch(`/api/submissions/${id}`, {
                            method: 'DELETE'
                        });

                        const result = await res.json();

                        if (res.ok && result.success) {
                            showToast('Record Deleted', 'Submission record has been removed from database.', 'success');
                            
                            // Visual fade out
                            const row = document.getElementById(`row-${id}`);
                            if (row) {
                                row.style.opacity = '0';
                                row.style.transform = 'scale(0.95)';
                                row.style.transition = 'all 0.3s ease';
                                setTimeout(() => {
                                    row.remove();
                                    fetchSubmissions(searchInput.value.trim());
                                }, 300);
                            }
                        } else {
                            throw new Error(result.message || 'Delete operation failed');
                        }
                    } catch (error) {
                        console.error('Delete error, falling back to local delete:', error);
                        
                        let data = JSON.parse(localStorage.getItem('static_submissions') || '[]');
                        data = data.filter(sub => sub._id !== id);
                        localStorage.setItem('static_submissions', JSON.stringify(data));
                        
                        showToast('Record Deleted', 'Submission record removed from local storage.', 'success');
                        const row = document.getElementById(`row-${id}`);
                        if (row) {
                            row.style.opacity = '0';
                            row.style.transform = 'scale(0.95)';
                            row.style.transition = 'all 0.3s ease';
                            setTimeout(() => {
                                row.remove();
                                fetchSubmissions(searchInput.value.trim());
                            }, 300);
                        }
                    }
                }
            };

            // Real-time live query searching (with input debouncing)
            let searchTimeout;
            if (searchInput) {
                searchInput.addEventListener('input', () => {
                    clearTimeout(searchTimeout);
                    searchTimeout = setTimeout(() => {
                        fetchSubmissions(searchInput.value.trim());
                    }, 400); // 400ms debounce buffer
                });
            }

            // Toolbar reload handler
            if (btnRefresh) {
                btnRefresh.addEventListener('click', () => {
                    searchInput.value = '';
                    fetchSubmissions();
                    checkAPIHealth();
                    showToast('Data Synced', 'Refreshed submissions list.', 'success');
                });
            }
